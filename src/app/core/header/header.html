<header class="header-wrapper">
  <mat-toolbar color="primary" class="header">
    <a [routerLink]="['/']" class="logo-link">
      <img src="assets/logo.png" alt="Book Store" class="logo-img" />
      <h1 class="logo-text">Book Store</h1>
    </a>

    <app-search />

    <nav class="header-nav">
      <a matButton [routerLink]="['/catalog']" routerLinkActive="active" class="nav-link">
        Catalog
      </a>

      <a matButton [routerLink]="['/about']" routerLinkActive="active" class="nav-link">
        About Us
      </a>
    </nav>

    <button matButton class="cart-button" [routerLink]="['/cart']">
      <mat-icon>shopping_cart</mat-icon>
      <span class="cart-text">Cart</span>
    </button>

    <button matButton class="auth-trigger" [matMenuTriggerFor]="authMenu">
      <mat-icon>account_circle</mat-icon>
    </button>

    <mat-menu #authMenu="matMenu">
      @if (!isAuth) {
        <button mat-menu-item [routerLink]="['/login']">Login</button>
        <button mat-menu-item [routerLink]="['/register']">Register</button>
      } @else {
        <button mat-menu-item [routerLink]="['/profile']">Profile</button>
        <button mat-menu-item (click)="logout()">Logout</button>
      }
    </mat-menu>
  </mat-toolbar>
</header>
