@if (this.authService.customer(); as customer) {
  <mat-card *ngIf="customer">
    <div class="row">
      <span>First Name: {{ customer.firstName }}</span>
      <button mat-icon-button (click)="edit('firstName', this.authService.customer.firstName)">
        <mat-icon>edit</mat-icon>
      </button>
    </div>

    <div class="row">
      <span>Last Name: {{ customer.lastName }}</span>
      <button mat-icon-button (click)="edit('lastName', this.authService.customer.lastName)">
        <mat-icon>edit</mat-icon>
      </button>
    </div>

    <div class="row">
      <span>Email: {{ customer.email }}</span>
      <button mat-icon-button (click)="edit('email', customer.email)">
        <mat-icon>edit</mat-icon>
      </button>
    </div>

    <div class="row">
      <span>Date of Birth: {{ customer }}</span>
      <button mat-icon-button (click)="edit('dateOfBirth', this.authService.customer.dateOfBirth)">
        <mat-icon>edit</mat-icon>
      </button>
    </div>
  </mat-card>
}
